<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</helmet>
<section style="display:flex;flex-direction:column;gap:20px">
  <div style="display:flex;align-items:baseline;gap:12px">
    <h2 style="font-family:'Baloo 2',sans-serif;font-weight:800;font-size:26px;margin:0;color:#3B5BDB">06 · Mascot Poses</h2>
    <div style="height:4px;flex:1;background:#212121;border-radius:2px;opacity:.15"></div>
  </div>
  <div style="font-size:13px;font-weight:700;opacity:.6;margin-top:-8px">Bespoke art (no Kenney equivalent) — same palette and outline weight as cover.png.</div>
  <div style="display:flex;gap:20px;flex-wrap:wrap">
    <sc-for list="{{ mascotPoses }}" as="pose" hint-placeholder-count="4">
      <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
        <div style="width:150px;height:150px;border:4px solid #212121;box-shadow:5px 5px 0 #212121;border-radius:16px;overflow:hidden;background:#4C6EF5">
          <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="mascot-{{ pose.id }}" shape="rect" placeholder="{{ pose.name }}" src="{{ pose.src }}" style="width:100%;height:100%" hint-size="150,150"></x-import>
        </div>
        <div style="font-size:13px;font-weight:700">{{ pose.name }}</div>
      </div>
    </sc-for>
  </div>
</section>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      mascotPoses: [
        { id: 'cover', name: 'Cover (existing)', src: './assets/mascot-cover.png' },
        { id: 'mining', name: 'Mining', src: './assets/mascot-mining.png' },
        { id: 'crafting', name: 'Crafting', src: './assets/mascot-crafting.png' },
        { id: 'celebrating', name: 'Celebrating', src: './assets/mascot-celebrating.png' },
      ],
    };
  }
}

</script>
</body>
</html>
