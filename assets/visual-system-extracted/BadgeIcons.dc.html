<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</helmet>
<section style="display:flex;flex-direction:column;gap:20px">
  <div style="display:flex;align-items:baseline;gap:12px">
    <h2 style="font-family:'Baloo 2',sans-serif;font-weight:800;font-size:26px;margin:0;color:#3B5BDB">04 · Chapter Badge Icons</h2>
    <div style="height:4px;flex:1;background:#212121;border-radius:2px;opacity:.15"></div>
  </div>
  <div style="font-size:13px;font-weight:700;opacity:.6;margin-top:-8px">From game-icons first (target, gear, question, checkmark, star, trophy, wrench) — only custom-drawn, matching style, when nothing fits.</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:20px">
    <sc-for list="{{ badgeIcons }}" as="icon" hint-placeholder-count="9">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="width:84px;height:84px;border-radius:50%;background:#fff;border:3px solid #212121;box-shadow:4px 4px 0 #212121;display:flex;align-items:center;justify-content:center;overflow:hidden">
          <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="badge-{{ icon.id }}" shape="circle" placeholder="{{ icon.name }}" src="{{ icon.src }}" style="width:66px;height:66px" hint-size="66,66"></x-import>
        </div>
        <div style="font-size:12px;font-weight:700;text-align:center;line-height:1.3">{{ icon.name }}<br><span style="opacity:.55;font-weight:600">{{ icon.source }}</span></div>
      </div>
    </sc-for>
  </div>
</section>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      badgeIcons: [
        { id: 'target', name: 'Target', source: 'game-icons', src: '../kenney/game-icons/PNG/Black/1x/target.png' },
        { id: 'gear', name: 'Gear', source: 'game-icons', src: '../kenney/game-icons/PNG/Black/1x/gear.png' },
        { id: 'question', name: 'Question Mark', source: 'game-icons', src: '../kenney/game-icons/PNG/Black/1x/question.png' },
        { id: 'checkmark', name: 'Checkmark', source: 'game-icons', src: '../kenney/game-icons/PNG/Black/1x/checkmark.png' },
        { id: 'star', name: 'Star', source: 'game-icons', src: '../kenney/game-icons/PNG/Black/1x/star.png' },
        { id: 'trophy', name: 'Trophy', source: 'game-icons', src: '../kenney/game-icons/PNG/Black/1x/trophy.png' },
        { id: 'wrench', name: 'Wrench', source: 'game-icons', src: '../kenney/game-icons/PNG/Black/1x/wrench.png' },
        // No map/compass icon exists in the real vendored game-icons 105-icon
        // set (checked Spritesheet/sheet_black1x.xml -- not guessed) -- hand-drawn
        // to match the pack's flat single-color silhouette style instead.
        { id: 'map', name: 'Map', source: 'custom (no game-icons equivalent)', src: './assets/custom-badge-map.png' },
        { id: 'blueprint', name: 'Blueprint', source: 'custom (matches pack)', src: './assets/custom-badge-blueprint.png' },
      ],
    };
  }
}

</script>
</body>
</html>
